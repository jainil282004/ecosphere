name: EcoSphere Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

env:
  PNPM_VERSION: "9.15.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Create environment file
        run: cp .env.${{ inputs.environment }}.example .env

      - name: Deploy container stack
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker/compose/docker-compose.${{ inputs.environment }}.yml \
            up -d --build

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:${NGINX_HTTP_PORT:-8080}/api/v1/health/ready; then
              exit 0
            fi
            sleep 5
          done
          echo "Deployment health check failed"
          exit 1
        env:
          NGINX_HTTP_PORT: ${{ inputs.environment == 'production' && '80' || '8080' }}

      - name: Deployment summary
        run: |
          echo "EcoSphere deployed to ${{ inputs.environment }}"
          docker compose \
            -f docker-compose.yml \
            -f docker/compose/docker-compose.${{ inputs.environment }}.yml \
            ps
