# Staging overlay — full container stack, no host bind mounts, seed disabled

services:
  postgres:
    restart: always
    ports: []

  redis:
    restart: always
    ports: []

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    container_name: ecosphere-migrate-staging
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ECOSPHERE_SEED_ON_MIGRATE: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecosphere_net
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecosphere-api-staging
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_PORT: 3000
      API_HOST: 0.0.0.0
      ECOSPHERE_SEED_ON_START: "false"
      DB_POOL_MAX: ${DB_POOL_MAX:-30}
      DB_POOL_IDLE_TIMEOUT: ${DB_POOL_IDLE_TIMEOUT:-30}
      DB_POOL_CONNECT_TIMEOUT: ${DB_POOL_CONNECT_TIMEOUT:-10}
      DB_PREPARE_STATEMENTS: ${DB_PREPARE_STATEMENTS:-true}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - ecosphere_net
    restart: always

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: /api/v1
    container_name: ecosphere-web-staging
    networks:
      - ecosphere_net
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: ecosphere-nginx-staging
    ports:
      - "${NGINX_HTTP_PORT:-8080}:8080"
    volumes:
      - ./infra/nginx/nginx.development.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/locations.conf:/etc/nginx/conf.d/locations.conf:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      - api
      - web
    networks:
      - ecosphere_net
    restart: always
