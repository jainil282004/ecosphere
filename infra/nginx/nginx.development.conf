# EcoSphere — Development reverse proxy (HTTP-only, no TLS redirect)
# Same hardening snippets as production minus HSTS / upgrade-insecure-requests.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 4096;
  server_tokens off;

  include /etc/nginx/snippets/gzip.conf;
  include /etc/nginx/snippets/security-headers-dev.conf;
  include /etc/nginx/snippets/rate-limits.conf;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';

  access_log /var/log/nginx/access.log main;

  upstream ecosphere_api {
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream ecosphere_web {
    server web:8080 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    location = /healthz {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    include /etc/nginx/conf.d/locations.conf;
  }
}
