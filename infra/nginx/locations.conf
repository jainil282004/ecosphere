# ── EcoSphere location blocks ─────────────────────────────────────────────────

client_max_body_size 12m;
limit_conn conn_limit 40;

error_page 429 = @rate_limit_exceeded;

location @rate_limit_exceeded {
  internal;
  default_type application/json;
  add_header Retry-After 60 always;
  return 429 '{"statusCode":429,"errorCode":"RATE_LIMITED","message":"Too many requests. Please retry later.","timestamp":"$time_iso8601"}';
}

location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password|refresh) {
  limit_req zone=auth_limit burst=3 nodelay;
  limit_req zone=bot_limit burst=1 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

# Report exports — PDF / Excel / CSV (extended upstream timeouts)
location ~ ^/api/v1/orgs/[^/]+/reports(/[^/]+/export|/export|/pipeline/[^/]+/export)?$ {
  limit_req zone=report_export_limit burst=5 nodelay;
  limit_req zone=scrape_limit burst=10 nodelay;
  limit_req zone=bot_limit burst=3 nodelay;
  include /etc/nginx/snippets/proxy-export-params.conf;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

location ~ ^/api/v1/orgs/[^/]+/reports {
  limit_req zone=scrape_limit burst=20 nodelay;
  limit_req zone=bot_limit burst=5 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

location ~ ^/api/v1/orgs/[^/]+/gamification/(leaderboard|leaderboards|rewards|badges) {
  limit_req zone=scrape_limit burst=20 nodelay;
  limit_req zone=bot_limit burst=5 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

location ~ ^/api/v1/orgs/[^/]+/governance/(audits|compliance) {
  limit_req zone=scrape_limit burst=15 nodelay;
  limit_req zone=api_write_limit burst=10 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

location ~ ^/api/v1/orgs/[^/]+/environmental {
  limit_req zone=scrape_limit burst=25 nodelay;
  limit_req zone=api_write_limit burst=12 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

location /api/v1/ {
  limit_req zone=api_limit burst=60 nodelay;
  limit_req zone=api_write_limit burst=15 nodelay;
  limit_req zone=bot_limit burst=5 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

location /api/docs {
  limit_req zone=scrape_limit burst=10 nodelay;
  limit_req zone=bot_limit burst=3 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_api;
}

location / {
  limit_req zone=scrape_limit burst=30 nodelay;
  include /etc/nginx/snippets/proxy-params.conf;
  proxy_pass http://ecosphere_web;
}
