# EcoSphere ESG Platform — Production Nginx reverse proxy (fresh baseline)
#
# • X-Real-IP, X-Forwarded-For, X-Forwarded-Proto on all proxied routes
# • Security headers: X-Frame-Options, X-Content-Type-Options, CSP
# • Gzip for JSON/JS/CSS; tiered rate limits incl. report export protection
# • Extended timeouts for PDF / Excel / CSV generation

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 4096;
  server_tokens off;
  client_body_timeout 15s;
  client_header_timeout 15s;
  send_timeout 120s;
  large_client_header_buffers 4 16k;

  include /etc/nginx/snippets/gzip.conf;
  include /etc/nginx/snippets/security-headers.conf;
  include /etc/nginx/snippets/rate-limits.conf;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time xff="$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  upstream ecosphere_api {
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream ecosphere_web {
    server web:8080 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    location = /healthz {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location = /healthz {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    include /etc/nginx/conf.d/locations.conf;
  }
}
