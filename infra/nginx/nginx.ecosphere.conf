# EcoSphere — Production gateway for docker-compose (embedded SPA)
# Uses the same hardened snippets as infra/nginx/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 4096;
  server_tokens off;
  client_body_timeout 12s;
  client_header_timeout 12s;
  send_timeout 60s;

  include /etc/nginx/snippets/gzip.conf;
  include /etc/nginx/snippets/security-headers.conf;
  include /etc/nginx/snippets/rate-limits.conf;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time '
                  'xff="$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  upstream ecosphere_api {
    server ecosphere-api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    include /etc/nginx/conf.d/locations-spa.conf;
  }

  include /etc/nginx/conf.d/optional/*.conf;
}
