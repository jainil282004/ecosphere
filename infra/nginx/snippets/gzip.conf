# ── Gzip compression (production-tuned) ───────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_disable "msie6";

gzip_types
  text/plain
  text/css
  text/javascript
  text/xml
  application/javascript
  application/json
  application/xml
  application/xml+rss
  application/vnd.ms-fontobject
  application/x-font-ttf
  font/opentype
  font/woff
  font/woff2
  image/svg+xml
  image/x-icon;
