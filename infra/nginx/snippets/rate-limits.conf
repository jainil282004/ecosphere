# ── Rate limiting & connection throttling ─────────────────────────────────────
# Mitigates DDoS bursts, credential stuffing, and API scraping vectors.
# Empty map keys skip a zone (nginx ignores empty limit_req keys).

limit_req_status 429;
limit_conn_status 429;
limit_req_log_level warn;

# General REST API throughput per client IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Mutating verbs — keyed only for POST/PUT/PATCH/DELETE (empty key = skipped)
map $request_method $write_limit_key {
  default "";
  POST    $binary_remote_addr;
  PUT     $binary_remote_addr;
  PATCH   $binary_remote_addr;
  DELETE  $binary_remote_addr;
}
limit_req_zone $write_limit_key zone=api_write_limit:10m rate=10r/s;

# Authentication & password recovery — brute-force protection
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Report builder & ESG exports (Environmental / Social / Governance / Summary)
limit_req_zone $binary_remote_addr zone=report_export_limit:10m rate=3r/m;

# Report/export/docs enumeration — scraping protection
limit_req_zone $binary_remote_addr zone=scrape_limit:10m rate=15r/s;

# Suspicious or empty User-Agent clients — keyed only when matched
map $http_user_agent $bot_limit_key {
  default "";
  ""      $binary_remote_addr;
  ~*(?i)(wget|curl/|python-requests|scrapy|httpclient|java/|libwww) $binary_remote_addr;
}
limit_req_zone $bot_limit_key zone=bot_limit:10m rate=2r/s;

# Concurrent connections per client IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
