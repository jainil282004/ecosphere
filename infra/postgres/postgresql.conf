# PostgreSQL performance tuning for local/staging EcoSphere deployments.
# Mounted read-only into the container via docker-compose.

# Accept connections from the Docker host (required for port-forwarded access)
listen_addresses = '*'

shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 64MB
work_mem = 8MB
wal_buffers = 16MB
random_page_cost = 1.1
effective_io_concurrency = 200
max_connections = 100
checkpoint_completion_target = 0.9
default_statistics_target = 100

# Logging useful for hackathon demos and query tuning
log_min_duration_statement = 250
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p]: '
